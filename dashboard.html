<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projektuebersicht</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap');

  :root {
    --bg: #f8f7f4;
    --card: #ffffff;
    --border: #d0cdc4;
    --border-light: #e8e5de;
    --primary: #9a7b2e;
    --primary-hover: #846a27;
    --primary-soft: rgba(154,123,46,0.08);
    --text: #1a1a2e;
    --muted: #6a6a7a;
    --surface: #f0ede6;
    --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.03);
    --shadow-lg: 0 4px 12px rgba(0,0,0,0.06);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, sans-serif;
    min-height: 100vh;
    line-height: 1.5;
  }

  .page-header {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  .page-header h1 {
    font: 600 24px/1.2 'Playfair Display', Georgia, serif;
    color: var(--text);
  }
  .page-header .subtitle {
    font: 400 13px/1 'Inter', sans-serif;
    color: var(--muted);
    margin-top: 2px;
  }
  .sleep-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    font: 500 12px 'Inter', sans-serif;
    color: var(--muted);
    padding: 8px 14px;
    background: var(--surface);
    border-radius: 8px;
    border: 1px solid var(--border-light);
  }
  .sleep-badge .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #94a3b8;
  }
  .sleep-badge .dot.active { background: #22c55e; animation: pulse-dot 2s infinite; }
  @keyframes pulse-dot { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

  .stats-bar {
    display: flex;
    gap: 8px;
    padding: 14px 32px;
    background: var(--card);
    border-bottom: 1px solid var(--border-light);
    flex-wrap: wrap;
    align-items: center;
  }
  .stat-chip {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font: 500 11px/1 'Inter', sans-serif;
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--border-light);
    background: var(--card);
    white-space: nowrap;
  }
  .stat-chip .num { font-weight: 600; }
  .stat-total {
    font: 600 13px 'Inter', sans-serif;
    color: var(--primary);
    margin-right: 8px;
  }

  .main {
    display: grid;
    grid-template-columns: 1fr 420px;
    gap: 0;
    max-width: 1400px;
    margin: 0 auto;
    min-height: calc(100vh - 120px);
  }
  @media (max-width: 1024px) {
    .main { grid-template-columns: 1fr; }
  }

  .wbs-panel {
    padding: 24px 32px;
    overflow-y: auto;
    max-height: calc(100vh - 120px);
  }
  .panel-title {
    font: 600 11px/1 'Inter', sans-serif;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--primary);
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border-light);
  }

  .search-box {
    position: relative;
    margin-bottom: 20px;
  }
  .search-box input {
    width: 100%;
    padding: 10px 14px 10px 38px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font: 400 13px 'Inter', sans-serif;
    outline: none;
    box-shadow: var(--shadow);
    transition: border-color 0.2s;
  }
  .search-box input:focus { border-color: var(--primary); }
  .search-box input::placeholder { color: #b0aaa0; }
  .search-box .icon {
    position: absolute;
    left: 13px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 14px;
  }

  .node {}
  .node-row {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 7px 12px;
    margin-bottom: 1px;
    border-radius: 8px;
    cursor: default;
    transition: background 0.15s;
  }
  .node-row.clickable { cursor: pointer; }
  .node-row:hover { background: var(--primary-soft); }

  .arrow {
    font-size: 10px;
    width: 16px;
    flex-shrink: 0;
    margin-top: 4px;
    color: var(--muted);
    transition: transform 0.2s;
    text-align: center;
  }
  .arrow.open { transform: rotate(90deg); color: var(--primary); }
  .arrow.leaf { opacity: 0; }

  .status-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 5px;
    border: 1.5px solid;
  }

  .node-content { flex: 1; min-width: 0; }
  .node-name {
    font: 500 13px/1.3 'Inter', sans-serif;
    color: var(--text);
  }
  .node-name.depth-0 { font: 600 15px/1.3 'Playfair Display', serif; }
  .node-name.depth-1 { font-weight: 600; font-size: 13px; }

  .node-meta {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 2px;
  }
  .node-badge {
    font: 500 10px 'Inter', sans-serif;
    padding: 1px 7px;
    border-radius: 4px;
    border: 1px solid;
  }
  .node-count {
    font: 400 10px 'Inter', sans-serif;
    color: var(--muted);
  }
  .node-desc {
    font: 300 12px/1.4 'Inter', sans-serif;
    color: var(--muted);
    margin-top: 2px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .children { margin-left: 20px; }
  .children > .node > .node-row { border-left: 2px solid var(--border-light); }

  .diary-panel {
    border-left: 1px solid var(--border);
    background: var(--card);
    padding: 24px;
    overflow-y: auto;
    max-height: calc(100vh - 120px);
  }

  .diary-entry {
    padding: 16px;
    margin-bottom: 12px;
    background: var(--bg);
    border-radius: 12px;
    border: 1px solid var(--border-light);
    transition: box-shadow 0.2s;
  }
  .diary-entry:hover { box-shadow: var(--shadow-lg); }
  .diary-entry.latest {
    border-color: var(--primary);
    border-width: 1.5px;
  }

  .diary-date {
    font: 600 11px 'Inter', sans-serif;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--primary);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .diary-date .tag {
    font: 500 10px 'Inter', sans-serif;
    padding: 1px 6px;
    border-radius: 4px;
    background: var(--primary-soft);
    color: var(--primary);
  }

  .diary-title {
    font: 600 15px/1.3 'Playfair Display', serif;
    color: var(--text);
    margin-bottom: 6px;
  }

  .diary-body {
    font: 400 13px/1.6 'Inter', sans-serif;
    color: var(--text);
  }
  .diary-body h3 {
    font: 600 12px 'Inter', sans-serif;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--primary);
    margin-top: 12px;
    margin-bottom: 4px;
  }
  .diary-body p { margin-bottom: 6px; }
  .diary-body ul { margin: 4px 0 8px 16px; }
  .diary-body li { font-size: 12px; color: var(--muted); margin-bottom: 2px; }

  .diary-empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font: 400 13px 'Inter', sans-serif;
  }
  .diary-empty .icon { font-size: 32px; margin-bottom: 12px; display: block; }

  .page-footer {
    padding: 12px 32px;
    border-top: 1px solid var(--border-light);
    font: 400 11px 'Inter', sans-serif;
    color: #b0aaa0;
    background: var(--card);
    text-align: center;
  }

  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 40px;
    color: var(--muted);
    font: 400 13px 'Inter', sans-serif;
  }
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header class="page-header">
  <div>
    <h1 id="page-title">Projektuebersicht</h1>
    <div class="subtitle" id="page-subtitle">Lade...</div>
  </div>
  <div class="sleep-badge" id="sleep-status">
    <span class="dot"></span>
    <span>Schlaf-Status laden...</span>
  </div>
</header>

<div class="stats-bar" id="stats-bar" style="display:none;"></div>

<div class="main">
  <div class="wbs-panel">
    <div class="panel-title">Projektstrukturplan</div>
    <div class="search-box">
      <span class="icon">&#x2315;</span>
      <input type="text" id="search" placeholder="Projekt suchen..." />
    </div>
    <div id="tree"><div class="loading"><div class="spinner"></div> Projektbaum laden...</div></div>
  </div>

  <div class="diary-panel">
    <div class="panel-title">Projekt-Tagebuch</div>
    <div id="diary"><div class="loading"><div class="spinner"></div> Tagebuch laden...</div></div>
  </div>
</div>

<footer class="page-footer" id="footer"></footer>

<script>
var BASE = location.origin.includes('kg-mcp') ? '' : 'https://kg-mcp.kailohmann.de';

var STATUS_CFG = {
  live:     { color: '#16a34a', bg: '#f0fdf4', label: 'Live' },
  active:   { color: '#2563eb', bg: '#eff6ff', label: 'Aktiv' },
  verified: { color: '#16a34a', bg: '#f0fdf4', label: 'Verifiziert' },
  explored: { color: '#7c3aed', bg: '#f5f3ff', label: 'Erforscht' },
  seed:     { color: '#94a3b8', bg: '#f8fafc', label: 'Seed' },
  deep:     { color: '#a855f7', bg: '#faf5ff', label: 'Deep' },
  planned:  { color: '#6b7280', bg: '#f9fafb', label: 'Geplant' },
  archived: { color: '#9ca3af', bg: '#f3f4f6', label: 'Archiviert' }
};

function cfg(st) { return STATUS_CFG[st] || STATUS_CFG.planned; }
function esc(s) { var d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
function countAll(n) { return 1 + (n.children||[]).reduce(function(s,c){return s+countAll(c);}, 0); }

var openState = {};
var treeData = null;

function renderNode(node, depth) {
  depth = depth || 0;
  var c = cfg(node.status);
  var hasKids = node.children && node.children.length > 0;
  var key = node.id;
  if (openState[key] === undefined) openState[key] = depth < 1;
  var isOpen = openState[key];
  var total = hasKids ? countAll(node) - 1 : 0;
  var dc = Math.min(depth, 2);

  var h = '<div class="node">';
  h += '<div class="node-row ' + (hasKids ? 'clickable' : '') + '" data-id="' + key + '">';
  h += '<span class="arrow ' + (isOpen ? 'open' : '') + ' ' + (!hasKids ? 'leaf' : '') + '">&#9654;</span>';
  h += '<span class="status-dot" style="background:' + c.bg + ';border-color:' + c.color + ';"></span>';
  h += '<div class="node-content">';
  h += '<span class="node-name depth-' + dc + '">' + esc(node.name) + '</span>';
  h += '<div class="node-meta">';
  h += '<span class="node-badge" style="background:' + c.bg + ';color:' + c.color + ';border-color:' + c.color + '40">' + c.label + '</span>';
  if (hasKids) h += '<span class="node-count">' + total + ' Element' + (total !== 1 ? 'e' : '') + '</span>';
  h += '</div>';
  if (depth > 0 && node.description && node.description !== node.name) {
    h += '<div class="node-desc">' + esc(node.description) + '</div>';
  }
  h += '</div></div>';
  if (hasKids && isOpen) {
    h += '<div class="children">';
    for (var i = 0; i < node.children.length; i++) h += renderNode(node.children[i], depth + 1);
    h += '</div>';
  }
  h += '</div>';
  return h;
}

function filterTree(node, q) {
  var match = (node.name||'').toLowerCase().indexOf(q) >= 0 ||
              (node.description||'').toLowerCase().indexOf(q) >= 0 ||
              (node.id||'').toLowerCase().indexOf(q) >= 0;
  if (!node.children || !node.children.length) return match ? Object.assign({}, node) : null;
  var kids = node.children.map(function(c){return filterTree(c,q);}).filter(Boolean);
  if (match || kids.length) return Object.assign({}, node, {children: kids.length ? kids : node.children});
  return null;
}

function renderFilteredNode(node, depth) {
  depth = depth || 0;
  var c = cfg(node.status);
  var hasKids = node.children && node.children.length > 0;
  var dc = Math.min(depth, 2);
  var h = '<div class="node"><div class="node-row">';
  h += '<span class="status-dot" style="background:' + c.bg + ';border-color:' + c.color + ';"></span>';
  h += '<div class="node-content"><span class="node-name depth-' + dc + '">' + esc(node.name) + '</span>';
  h += '<div class="node-meta"><span class="node-badge" style="background:' + c.bg + ';color:' + c.color + ';border-color:' + c.color + '40">' + c.label + '</span></div>';
  h += '</div></div>';
  if (hasKids) { h += '<div class="children">'; for (var i=0;i<node.children.length;i++) h += renderFilteredNode(node.children[i], depth+1); h += '</div>'; }
  h += '</div>';
  return h;
}

function renderTree() {
  if (!treeData) return;
  var q = document.getElementById('search').value.trim().toLowerCase();
  var el = document.getElementById('tree');
  if (q) {
    var f = filterTree(treeData, q);
    el.innerHTML = f ? renderFilteredNode(f) : '<div class="diary-empty">Keine Treffer</div>';
  } else {
    el.innerHTML = renderNode(treeData);
  }
}

document.getElementById('tree').addEventListener('click', function(e) {
  var row = e.target.closest('.node-row.clickable');
  if (!row) return;
  var id = row.dataset.id;
  openState[id] = !openState[id];
  renderTree();
});
document.getElementById('search').addEventListener('input', renderTree);

function renderMarkdown(md) {
  return md
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h3>$1</h3>')
    .replace(/^# (.+)$/gm, '')
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/\n{2,}/g, '</p><p>')
    .replace(/\n/g, '<br>')
    .replace(/<li>/g, '</p><ul><li>').replace(/<\/li><br>/g, '</li></ul><p>');
}

function renderDiary(docs) {
  var el = document.getElementById('diary');
  if (!docs || !docs.length) {
    el.innerHTML = '<div class="diary-empty"><span class="icon">&#127769;</span>Noch keine Tagebuch-Eintraege.<br>Der Schlaf-Workflow erstellt jede Nacht einen Eintrag.</div>';
    return;
  }
  var h = '';
  for (var i = 0; i < docs.length; i++) {
    var doc = docs[i];
    var date = doc.updated ? new Date(doc.updated * 1000).toLocaleDateString('de-DE', {weekday:'long',day:'numeric',month:'long',year:'numeric'}) : '';
    var isDiary = doc.title.indexOf('Tagebuch') === 0;
    var isTraum = doc.title.indexOf('Traum') >= 0;
    h += '<div class="diary-entry ' + (i === 0 ? 'latest' : '') + '">';
    h += '<div class="diary-date">' + date;
    if (isDiary) h += '<span class="tag">Tagebuch</span>';
    else if (isTraum) h += '<span class="tag">Traum</span>';
    h += '</div>';
    h += '<div class="diary-title">' + esc(doc.title) + '</div>';
    if (doc.content) h += '<div class="diary-body">' + renderMarkdown(doc.content) + '</div>';
    h += '</div>';
  }
  el.innerHTML = h;
}

function renderStats(data) {
  if (!data.stats) return;
  var bar = document.getElementById('stats-bar');
  var order = ['live','verified','active','explored','deep','seed','archived'];
  var h = '<span class="stat-total">' + data.stats.total_nodes + ' Projekte</span>';
  for (var j = 0; j < order.length; j++) {
    var st = order[j];
    var n = data.stats.by_status[st];
    if (!n) continue;
    var c = cfg(st);
    h += '<span class="stat-chip" style="color:' + c.color + ';border-color:' + c.color + '30;background:' + c.bg + '"><span class="num">' + n + '</span> ' + c.label + '</span>';
  }
  bar.innerHTML = h;
  bar.style.display = 'flex';
}

function loadSleepStatus() {
  fetch(BASE + '/sleep/status').then(function(r){return r.json();}).then(function(d) {
    var el = document.getElementById('sleep-status');
    var active = d.scheduler_active;
    var next = d.next_run ? new Date(d.next_run).toLocaleString('de-DE', {hour:'2-digit',minute:'2-digit'}) : '--';
    var info = active ? 'Aktiv - Naechster Lauf: ' + next : 'Inaktiv';
    if (d.last_run && d.last_run.traum_titel) info += ' - Letzter Traum: ' + d.last_run.traum_titel;
    el.innerHTML = '<span class="dot ' + (active ? 'active' : '') + '"></span><span>' + info + '</span>';
  }).catch(function() {
    document.getElementById('sleep-status').innerHTML = '<span class="dot"></span><span>Nicht erreichbar</span>';
  });
}

function init() {
  loadSleepStatus();

  fetch(BASE + '/wbs?depth=5').then(function(r){return r.json();}).then(function(data) {
    treeData = data;
    document.getElementById('page-title').textContent = data.name || 'Projektuebersicht';
    document.getElementById('page-subtitle').textContent = (data.stats ? data.stats.total_nodes : 0) + ' Projekte - Knowledge Graph';
    renderStats(data);
    renderTree();
  }).catch(function(e) {
    document.getElementById('tree').innerHTML = '<div class="diary-empty">Fehler: ' + esc(e.message) + '</div>';
  });

  fetch(BASE + '/diary?limit=10').then(function(r){return r.json();}).then(function(d) {
    renderDiary(d.docs || []);
  }).catch(function() {
    document.getElementById('diary').innerHTML = '<div class="diary-empty">Tagebuch nicht verfuegbar</div>';
  });

  document.getElementById('footer').textContent = 'Knowledge Graph - kg-mcp.kailohmann.de - ' + new Date().toLocaleDateString('de-DE');
}

init();
</script>
</body>
</html>
