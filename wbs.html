<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WBS – Kais Digitales Ökosystem</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500&display=swap');
  
  :root {
    --bg: #0a0e17; --fg: #e2e8f0; --muted: #64748b; --dim: #475569;
    --border: rgba(255,255,255,0.06);
  }
  
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--fg); font-family: 'Inter', -apple-system, sans-serif; min-height: 100vh; }
  
  .container { max-width: 900px; margin: 0 auto; padding: 24px 20px; }
  
  .header { margin-bottom: 20px; }
  .header .label { font: 500 10px/1 'JetBrains Mono', monospace; color: var(--dim); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px; }
  .header h1 { font: 600 22px/1.2 'JetBrains Mono', monospace; color: #f8fafc; letter-spacing: -0.02em; }
  .header .hint { font-size: 12px; color: var(--muted); margin-top: 4px; }
  
  .search { position: relative; margin-bottom: 16px; }
  .search input { width: 100%; padding: 10px 14px 10px 36px; background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 8px; color: var(--fg); font: 13px 'JetBrains Mono', monospace; outline: none; }
  .search input:focus { border-color: rgba(59,130,246,0.5); }
  .search .icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 14px; }
  
  .stats { display: flex; gap: 12px; padding: 12px 16px; background: rgba(255,255,255,0.02); border-radius: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; border: 1px solid var(--border); }
  .stats .total { font: 12px 'JetBrains Mono', monospace; color: #94a3b8; margin-right: 4px; }
  .stat { display: flex; align-items: center; gap: 4px; font: 11px 'JetBrains Mono', monospace; }
  .stat .label { color: var(--dim); }
  
  .tree { }
  .node { margin-left: 0; }
  .node-inner { display: flex; align-items: flex-start; gap: 10px; padding: 8px 12px; margin-bottom: 2px; border-radius: 8px; transition: background 0.15s; }
  .node-inner.has-children { cursor: pointer; }
  .node-inner:hover { background: var(--hover-bg, transparent); }
  .node-inner.open { background: var(--hover-bg, transparent); }
  
  .expand { font: 11px monospace; width: 16px; flex-shrink: 0; margin-top: 3px; transition: transform 0.2s; display: inline-block; }
  .expand.open { transform: rotate(90deg); }
  .expand.leaf { opacity: 0.3; }
  
  .dot { font-size: 14px; flex-shrink: 0; margin-top: 1px; }
  
  .content { flex: 1; min-width: 0; }
  .content .title-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .content .name { font: 600 14px 'JetBrains Mono', monospace; color: #e2e8f0; }
  .content .name.l0 { font-size: 16px; color: #f8fafc; letter-spacing: 0.02em; }
  .content .name.l1 { font-size: 14px; }
  .content .name.l2 { font-size: 13px; font-weight: 400; color: #cbd5e1; }
  
  .badge { font: 500 10px 'JetBrains Mono', monospace; padding: 1px 6px; border-radius: 4px; }
  .child-count { font: 10px 'JetBrains Mono', monospace; color: var(--muted); }
  
  .desc { font-size: 12px; color: var(--muted); margin-top: 2px; line-height: 1.4; }
  
  .children { overflow: hidden; }
  .children > .node { margin-left: 20px; }
  .children > .node > .node-inner { border-left: 2px solid var(--border); }
  .children > .node > .node-inner.open { border-left-color: var(--node-color); }
  
  .footer { margin-top: 32px; padding: 12px 16px; background: rgba(255,255,255,0.02); border-radius: 8px; border: 1px solid var(--border); font: 11px 'JetBrains Mono', monospace; color: var(--dim); }
  
  .loading { text-align: center; padding: 60px; color: var(--muted); font: 13px 'JetBrains Mono', monospace; }
  .error { text-align: center; padding: 40px; color: #ef4444; font: 13px 'JetBrains Mono', monospace; }
  .error .retry { margin-top: 12px; padding: 8px 16px; background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); border-radius: 6px; color: #ef4444; cursor: pointer; font: 12px 'JetBrains Mono', monospace; }
  
  @keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }
  .loading .dots { animation: pulse 1.5s infinite; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="label">Projektstrukturplan (WBS)</div>
    <h1 id="title">Lade…</h1>
    <div class="hint">Klicke auf ▶ um Unterelemente aufzuklappen</div>
  </div>
  
  <div class="search">
    <span class="icon">⌕</span>
    <input type="text" id="search" placeholder="Suche im Projektbaum…" />
  </div>
  
  <div id="stats" class="stats" style="display:none;"></div>
  <div id="tree"></div>
  <div id="footer" class="footer" style="display:none;"></div>
</div>

<script>
const STATUS = {
  live:     { color: "#22c55e", bg: "rgba(34,197,94,0.1)",  label: "Live",      icon: "●" },
  active:   { color: "#3b82f6", bg: "rgba(59,130,246,0.1)", label: "Aktiv",     icon: "◉" },
  partial:  { color: "#f59e0b", bg: "rgba(245,158,11,0.1)", label: "Teilweise", icon: "◐" },
  explored: { color: "#8b5cf6", bg: "rgba(139,92,246,0.1)", label: "Erforscht", icon: "◎" },
  planned:  { color: "#6b7280", bg: "rgba(107,114,128,0.1)",label: "Geplant",   icon: "○" },
  seed:     { color: "#94a3b8", bg: "rgba(148,163,184,0.08)",label: "Seed",     icon: "·" },
  open:     { color: "#ef4444", bg: "rgba(239,68,68,0.1)",  label: "Offen",     icon: "!" },
  deep:     { color: "#c084fc", bg: "rgba(192,132,252,0.1)",label: "Deep",      icon: "◆" },
  verified: { color: "#22c55e", bg: "rgba(34,197,94,0.08)", label: "Verifiziert",icon: "✓" },
};

const API_URL = (location.hostname === "localhost" || location.hostname === "127.0.0.1")
  ? "http://localhost:8099/wbs"
  : "https://kg-mcp.kailohmann.de/wbs";

let treeData = null;
const openState = new Map();

function cfg(status) { return STATUS[status] || STATUS.planned; }

function countTotal(node) {
  return 1 + (node.children || []).reduce((s, c) => s + countTotal(c), 0);
}

function renderStats(data) {
  const el = document.getElementById("stats");
  if (!data.stats) { el.style.display = "none"; return; }
  const order = ["live","verified","active","partial","explored","deep","planned","seed","open"];
  let html = `<span class="total">${data.stats.total_nodes} Nodes</span>`;
  for (const st of order) {
    const count = data.stats.by_status[st];
    if (!count) continue;
    const c = cfg(st);
    html += `<span class="stat" style="color:${c.color}">${c.icon} ${count} <span class="label">${c.label}</span></span>`;
  }
  el.innerHTML = html;
  el.style.display = "flex";
}

function renderNode(node, depth = 0, parentOpen = true) {
  const c = cfg(node.status);
  const hasKids = node.children && node.children.length > 0;
  const key = node.id;
  if (!openState.has(key)) openState.set(key, depth < 1);
  const isOpen = openState.get(key);
  const total = hasKids ? countTotal(node) - 1 : 0;
  const depthClass = depth === 0 ? "l0" : depth === 1 ? "l1" : "l2";
  
  let html = `<div class="node" style="--node-color:${c.color}; --hover-bg:${c.bg}">`;
  html += `<div class="node-inner ${hasKids ? 'has-children' : ''} ${isOpen && hasKids ? 'open' : ''}" data-id="${key}" data-depth="${depth}">`;
  html += `<span class="expand ${isOpen ? 'open' : ''} ${!hasKids ? 'leaf' : ''}" style="color:${c.color}">${hasKids ? '▶' : ' '}</span>`;
  html += `<span class="dot" style="color:${c.color}">${c.icon}</span>`;
  html += `<div class="content">`;
  html += `<div class="title-row">`;
  html += `<span class="name ${depthClass}">${esc(node.name)}</span>`;
  html += `<span class="badge" style="background:${c.bg};color:${c.color};border:1px solid ${c.color}33">${c.label}</span>`;
  if (hasKids) html += `<span class="child-count">${total} Element${total !== 1 ? 'e' : ''}</span>`;
  html += `</div>`;
  if (node.description && node.description !== node.name) {
    html += `<div class="desc">${esc(node.description)}</div>`;
  }
  html += `</div></div>`;
  
  if (hasKids && isOpen) {
    html += `<div class="children">`;
    for (const child of node.children) {
      html += renderNode(child, depth + 1, isOpen);
    }
    html += `</div>`;
  }
  html += `</div>`;
  return html;
}

function filterTree(node, q) {
  const match = (node.name || "").toLowerCase().includes(q) ||
                (node.description || "").toLowerCase().includes(q) ||
                (node.id || "").toLowerCase().includes(q);
  if (!node.children || node.children.length === 0) return match ? { ...node } : null;
  const filtered = node.children.map(c => filterTree(c, q)).filter(Boolean);
  if (match || filtered.length > 0) {
    return { ...node, children: filtered.length > 0 ? filtered : node.children };
  }
  return null;
}

function renderFiltered(node, depth = 0) {
  const c = cfg(node.status);
  const hasKids = node.children && node.children.length > 0;
  let html = `<div class="node" style="--node-color:${c.color}; --hover-bg:${c.bg}">`;
  html += `<div class="node-inner open" style="border-left-color:${c.color}">`;
  html += `<span class="dot" style="color:${c.color}">${c.icon}</span>`;
  html += `<div class="content"><div class="title-row">`;
  html += `<span class="name ${depth <= 1 ? 'l1' : 'l2'}">${esc(node.name)}</span>`;
  html += `<span class="badge" style="background:${c.bg};color:${c.color};border:1px solid ${c.color}33">${c.label}</span>`;
  html += `</div>`;
  if (node.description && node.description !== node.name) {
    html += `<div class="desc">${esc(node.description)}</div>`;
  }
  html += `</div></div>`;
  if (hasKids) {
    html += `<div class="children">`;
    for (const child of node.children) html += renderFiltered(child, depth + 1);
    html += `</div>`;
  }
  html += `</div>`;
  return html;
}

function esc(s) {
  const d = document.createElement("div");
  d.textContent = s || "";
  return d.innerHTML;
}

function render() {
  if (!treeData) return;
  const q = document.getElementById("search").value.trim().toLowerCase();
  const el = document.getElementById("tree");
  if (q) {
    const filtered = filterTree(treeData, q);
    el.innerHTML = filtered ? renderFiltered(filtered) : `<div class="loading">Keine Treffer für „${esc(q)}"</div>`;
  } else {
    el.innerHTML = renderNode(treeData);
  }
}

document.getElementById("tree").addEventListener("click", (e) => {
  const inner = e.target.closest(".node-inner.has-children");
  if (!inner) return;
  const id = inner.dataset.id;
  openState.set(id, !openState.get(id));
  render();
});

document.getElementById("search").addEventListener("input", render);

async function load() {
  const treeEl = document.getElementById("tree");
  treeEl.innerHTML = '<div class="loading"><span class="dots">●●●</span> Lade Projektbaum…</div>';
  try {
    const res = await fetch(API_URL);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    treeData = await res.json();
    if (treeData.error) throw new Error(treeData.error);
    document.getElementById("title").textContent = treeData.name || "Projektstrukturplan";
    renderStats(treeData);
    render();
    const date = treeData.generated_at ? new Date(treeData.generated_at * 1000).toLocaleString("de-DE") : "–";
    const footer = document.getElementById("footer");
    footer.textContent = `Datenquelle: Knowledge Graph kg-mcp.kailohmann.de · Generiert: ${date}`;
    footer.style.display = "block";
  } catch (err) {
    treeEl.innerHTML = `<div class="error">Fehler: ${esc(err.message)}<br><button class="retry" onclick="load()">Erneut versuchen</button></div>`;
  }
}

load();
</script>
</body>
</html>
